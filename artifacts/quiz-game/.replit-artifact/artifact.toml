kind = "web"
previewPath = "/"
title = "Quiz Game"
version = "1.0.0"
id = "artifacts/quiz-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25006

[services.development]
run = "pnpm --filter @workspace/quiz-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quiz-game", "run", "build" ]
publicDir = "artifacts/quiz-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25006"
BASE_PATH = "/"
